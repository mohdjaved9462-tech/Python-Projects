<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kokoro TTS — Hindi & English</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="card">
  <h1>🌍 Kokoro TTS</h1>
  <p class="subtitle">Fully local • Multi-language • Fast inference</p>

  <!-- Text input -->
  <div class="field">
    <label for="text">Text likhein</label>
    <textarea id="text" placeholder=></textarea>
  </div>

  <!-- Language + Voice selector -->
  <div class="two-col">
    <div>
      <label for="languageSelect">Language</label>
      <select id="languageSelect" onchange="onLangChange()">
        <option value="hi"selected>🇮🇳 Hindi</option>
        <option value="en" >🇺🇸 English (US)</option>
        <option value="en-gb">🇬🇧 English (UK)</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="fr">🇫🇷 French</option>
        <option value="it">🇩🇪 Italian</option>
        <option value="pt">🇧🇷 Portuguese (BR)</option>
        <option value="zh-cn">🇨🇳 Chinese</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
      </select>
    </div>
    <div>
      <label for="voiceSelect">Voice</label>
      <select id="voiceSelect"></select>
    </div>
  </div>

  <!-- Speed slider -->
  <div class="field">
    <label>Speed</label>
    <div class="speed-row">
      <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0"
             oninput="document.getElementById('speedVal').textContent = parseFloat(this.value).toFixed(1) + '×'"/>
      <span class="speed-label" id="speedVal">1.0×</span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="action" id="speakBtn" onclick="speak()">▶ Generate Speech</button>
    <button class="action" id="downloadBtn" disabled onclick="downloadAudio()">⬇ Download</button>
    <button class="action" id="recordBtn">🎤 Record</button>
    <button class="action" id="stopRecBtn" disabled>⏹ Stop</button>
  </div>

  <div id="status"></div>
  <audio id="player" controls></audio>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
